
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A R Vastram Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* HEADER */

header{
background:#111;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:1px;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#667eea;
}

/* MAIN LOGIN AREA */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 0.8s ease;
}

.login-container h2{
margin-bottom:20px;
color:#333;
}

.login-container input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

.login-container input:focus{
border-color:#667eea;
box-shadow:0 0 5px rgba(102,126,234,0.5);
}

.login-container button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login-container button:hover{
background:#5563d1;
transform:translateY(-2px);
}

.error{
color:red;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#111;
color:#aaa;
text-align:center;
padding:15px;
font-size:14px;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:500px){

header{
flex-direction:column;
gap:10px;
text-align:center;
}

.login-container{
width:90%;
padding:30px;
}

}

</style>
</head>

<body>

<header>
<div class="logo">A RVastram</div>
<nav>
<a href="/">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="main">

<div class="login-container">

<h2>Admin Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</div>

<footer>
© 2026 A RVastram. All Rights Reserved.
</footer>

</body>
</html>
