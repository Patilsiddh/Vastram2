<!DOCTYPE html>
<html>
<head>
    <title>Dream Homes Real Estate</title>
    <style>
        body {font-family: Arial; margin:0;}
        nav {background:#222; color:white; padding:15px; text-align:center;}
        section {padding:40px; text-align:center;}
        footer {background:#111; color:white; padding:20px;}

        /* Popup */
        .popup {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.6);
        }

        .popup-content {
            background:white;
            width:300px;
            padding:20px;
            margin:100px auto;
            position:relative;
            border-radius:8px;
        }

        .close {
            position:absolute;
            right:10px;
            top:5px;
            cursor:pointer;
            font-size:18px;
        }

        input, button {
            width:100%;
            margin:8px 0;
            padding:8px;
        }
    </style>
</head>

<body>

<nav>
    Dream Homes Real Estate
</nav>

<section>
    <h2>Luxury Villas</h2>
    <img src="https://via.placeholder.com/600x300">
    <p>Premium properties at best prices.</p>
</section>

<section>
    <h2>Testimonials</h2>
    <p>"Best real estate service!" - Rahul</p>
    <p>"Found my dream home!" - Sneha</p>
</section>

<section>
    <h2>Contact Us</h2>
    <p>Email: info@dreamhomes.com</p>
</section>

<footer>
    © 2026 Dream Homes
</footer>

<!-- Popup Form -->
<div class="popup" id="popupForm">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">❌</span>
        <h3>We Will Contact You</h3>
        <form id="leadForm">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="text" name="phone" placeholder="Contact Number" required>
            <input type="email" name="email" placeholder="Email (Optional)">
            <button type="submit">Submit</button>
        </form>
    </div>
</div>

<script>
let popupShown = false;

window.onload = function() {
    setTimeout(showPopup, 3000);
};

document.body.addEventListener("click", function() {
    if(!popupShown){
        showPopup();
    }
});

function showPopup(){
    document.getElementById("popupForm").style.display="block";
    popupShown = true;
}

function closePopup(){
    document.getElementById("popupForm").style.display="none";
}

document.getElementById("leadForm").addEventListener("submit", function(e){
    e.preventDefault();
    fetch("/submit", {
        method:"POST",
        body: new FormData(this)
    }).then(res => res.text())
    .then(data => {
        alert("Thank You! We will contact you.");
        closePopup();
    });
});
</script>

</body>
</html>
