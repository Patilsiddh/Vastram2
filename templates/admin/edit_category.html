<!DOCTYPE html>
<html>
<head>
    <title>Edit Category</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f6f8; }
        h2 { color: #333; }
        input, button { padding: 8px; margin: 5px 0; width: 300px; }
        button { background: #2b7cff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        a { text-decoration: none; color: #dc3545; margin-left: 10px; }
    </style>
</head>
<body>

<h2>Edit Category</h2>

<form method="post">
    <input type="text" name="name" placeholder="Category Name" value="{{ category[1] }}" required><br>
    <button type="submit">Update Category</button>
    <a href="/admin/dashboard">Cancel</a>
</form>

</body>
</html>
