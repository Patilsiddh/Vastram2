<!DOCTYPE html>
<html>
<head>
    <title>Upload Images</title>
</head>
<body>

<h2>Upload Front and Back Image</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">
    <label>Front Image:</label>
    <input type="file" name="front" required><br><br>

    <label>Back Image:</label>
    <input type="file" name="back" required><br><br>

    <button type="submit">Upload</button>
</form>

<hr>

<h3>Uploaded Images</h3>

{% for img in images %}
    <div style="margin-bottom:20px;">
        <p>ID: {{ img[0] }}</p>

<img src="{{ url_for('static', filename='uploads/' + img[1]) }}" width="200">
<img src="{{ url_for('static', filename='uploads/' + img[2]) }}" width="200">
    </div>
{% endfor %}

</body>
</html>
