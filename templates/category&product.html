<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products Page</title>
<style>
/* ==================== CAROUSEL ==================== */
.men-carousel {
  width: 100%;
  max-width: 800px;
  height: 420px;
  overflow: hidden;
  border-radius: 15px;
  margin: 30px auto;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.slides {
  display: flex;
  transition: transform 0.7s ease;
}
.slides img {
  flex: 0 0 100%;
  height: 420px;
  object-fit: cover;
}
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 28px;
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  z-index: 10;
  border-radius: 50%;
}
.arrow:hover { background: rgba(0,0,0,0.8); }
.left { left: 15px; }
.right { right: 15px; }

/* ==================== FILTER ==================== */
.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  align-items: center;
  padding: 15px 25px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin: 20px auto;
  max-width: 1200px;
}
.categories strong { color:#498ff1; margin-right:10px; font-size:16px; }
.categories label { background:#f4f6fb; padding:6px 12px; border-radius:20px; cursor:pointer; transition:0.3s; }
.categories label:hover { background:#498ff1; color:#fff; }
#priceRange { margin: 0 10px; }
#priceValue { font-weight:bold; }
#resetFilter { background:#ff5252; color:#fff; border:none; padding:6px 16px; border-radius:20px; cursor:pointer; transition:0.3s; }
#resetFilter:hover { background:#e04343; }

/* ==================== PRODUCTS GRID ==================== */
.products {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 20px 40px;
}
/* ==================== PRICE FILTER INLINE ==================== */
.categories {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  padding: 15px 25px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  margin: 20px auto;
  max-width: 1200px;
}

.categories strong { color:#498ff1; font-size:16px; margin-right:5px; }

#priceRange-container {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

#priceRange {
  width: 150px;  /* smaller width */
  height: 6px;
  cursor: pointer;
}

#priceValue {
  font-weight: bold;
  white-space: nowrap;
}

/* Responsive adjustments */
@media(max-width:768px) {
  #priceRange {
    width: 120px;
  }
  #priceValue {
    font-size: 13px;
  }
}
@media(max-width:1024px){ .products { grid-template-columns: repeat(2, 1fr); } }
@media(max-width:768px){ .products { grid-template-columns: 1fr; } }

.card { 
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 6px 16px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.12); }
.card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; transition: 0.3s; }
.card img:hover { transform: scale(1.05); }
.card h3 { font-size: 16px; margin: 10px 0 5px; color: #333; }
.card .short-desc { font-size: 13px; color: #666; margin-bottom: 5px; }
.price-box { margin: 8px 0; }
.mrp { color: rgb(240,186,87); text-decoration: line-through; font-size: 14px; margin-right: 6px; }
.discount { color: #498ff1; font-weight: bold; font-size: 17px; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.view-btn, .btn { flex: 1; padding: 8px 12px; border-radius: 6px; border: none; background: #498ff1; color: #fff; font-size: 14px; transition: 0.3s; }
.view-btn:hover, .btn:hover { background: #2b5fcf; }
.add-wish { background: #ff4081; }
.add-wish:hover { background: #e73372; }
.size-box { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 6px 0; }
.size-btn { border: 1px solid #498ff1; padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; background: #fff; min-width: 40px; text-align: center; transition: 0.2s; }
.size-btn.active { background: #498ff1; color: #fff; }
.size-btn:hover { background: #498ff1; color: #fff; }
</style>
</head>
<body>

<!-- ========== CAROUSEL ========== -->
<div class="men-carousel">
  <button class="arrow left">&#10094;</button>
  <button class="arrow right">&#10095;</button>
  <div class="slides" id="slides">
    <img src="static/uploads/Carosal2.jpg" alt="Slide 1">
    <img src="static/uploads/Carosal5.jpg" alt="Slide 2">
    <img src="static/uploads/Jodhpuri.jpg" alt="Slide 3">
    <img src="static/uploads/Ladies_Blazer.jpg" alt="Slide 4">
  </div>
</div>

<!-- ========== CATEGORY + PRICE FILTER ========== -->
<div class="categories">
  <strong>Filter by Category:</strong>
  <!-- Example categories -->
  <label><input type="checkbox" class="cat-filter" value="Jodhpuri"> Jodhpuri</label>
  <label><input type="checkbox" class="cat-filter" value="Blazer"> Blazer</label>
  <strong>Price:</strong>
  <input type="range" id="priceRange" min="0" max="10000" step="10">
  <span id="priceValue">₹0 - ₹10000</span>
  <button id="resetFilter">Reset</button>
</div>

<!-- ========== PRODUCTS GRID ========== -->
<div class="products">
  <!-- Example products -->
  <div class="card" data-category="Jodhpuri" data-price="5000">
    <img src="static/uploads/Jodhpuri.jpg" alt="Jodhpuri">
    <h3>Classic Jodhpuri</h3>
    <p class="short-desc">Elegant traditional Jodhpuri suit for men.</p>
    <p class="price-box"><span class="discount">₹5000</span></p>
    <div class="actions">
      <a href="#" class="view-btn">View</a>
      <button class="btn add-wish">Wishlist</button>
    </div>
  </div>

  <div class="card" data-category="Blazer" data-price="3500">
    <img src="static/uploads/Ladies_Blazer.jpg" alt="Blazer">
    <h3>Ladies Blazer</h3>
    <p class="short-desc">Stylish blazer for office and casual events.</p>
    <p class="price-box"><span class="discount">₹3500</span></p>
    <div class="actions">
      <a href="#" class="view-btn">View</a>
      <button class="btn add-wish">Wishlist</button>
    </div>
  </div>
</div>

<script>
// ==================== CAROUSEL JS ====================
const slides = document.getElementById('slides');
const images = slides.querySelectorAll('img');
let slideIndex = 0;
function showSlide(i){ slides.style.transform = `translateX(-${i*100}%)`; }
document.querySelector('.left').addEventListener('click',()=>{ slideIndex=(slideIndex-1+images.length)%images.length; showSlide(slideIndex); });
document.querySelector('.right').addEventListener('click',()=>{ slideIndex=(slideIndex+1)%images.length; showSlide(slideIndex); });
setInterval(()=>{ slideIndex=(slideIndex+1)%images.length; showSlide(slideIndex); },5000);

// ==================== FILTER JS ====================
const categoryCheckboxes = document.querySelectorAll('.cat-filter');
const priceRange = document.getElementById('priceRange');
const priceValue = document.getElementById('priceValue');
const resetBtn = document.getElementById('resetFilter');
const productCards = document.querySelectorAll('.products .card');

// Set price max dynamically
let maxPrice = 0;
productCards.forEach(card => { const p=parseFloat(card.dataset.price); if(p>maxPrice) maxPrice=p; });
priceRange.max = maxPrice; priceRange.value = maxPrice;
priceValue.textContent=`₹0 - ₹${maxPrice}`;

function filterProducts(){
  const selectedCats = Array.from(categoryCheckboxes).filter(cb=>cb.checked).map(cb=>cb.value);
  const maxP = parseFloat(priceRange.value);
  productCards.forEach(card=>{
    const cat = card.dataset.category;
    const price = parseFloat(card.dataset.price);
    const catMatch = selectedCats.length===0 || selectedCats.includes(cat);
    const priceMatch = price <= maxP;
    card.style.display = (catMatch && priceMatch)? 'flex':'none';
  });
}

categoryCheckboxes.forEach(cb=>cb.addEventListener('change',filterProducts));
priceRange.addEventListener('input',()=>{ priceValue.textContent=`₹0 - ₹${priceRange.value}`; filterProducts(); });
resetBtn.addEventListener('click',()=>{ categoryCheckboxes.forEach(cb=>cb.checked=false); priceRange.value=maxPrice; priceValue.textContent=`₹0 - ₹${maxPrice}`; filterProducts(); });

// ==================== IMAGE CLICK JS ====================
document.querySelectorAll('.products .card img').forEach(img=>{
  img.style.cursor='pointer';
  img.addEventListener('click',function(){
    const link = img.closest('.card').querySelector('.view-btn').getAttribute('href');
    if(link) window.location.href = link;
  });
});
</script>
</body>
</html>
