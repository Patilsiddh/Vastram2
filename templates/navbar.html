<style>
/* ==================== RESET ==================== */
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  font-family: 'Roboto', sans-serif; 
}

body { 
  background: #f8f8f8; 
  color: #333; 
  line-height: 1.6; 
  overflow-x: hidden; /* prevent left-right movement */
}

a { 
  text-decoration: none; 
  color: inherit; 
  transition: 0.3s; 
}

ul { 
  list-style: none; 
}

img { 
  display: block; 
  max-width: 100%; 
  height: auto; /* responsive images */
}

button { 
  cursor: pointer; 
  outline: none; 
}

input, textarea { 
  font-family: 'Roboto', sans-serif; 
  width: 100%; /* better responsiveness */
}


/* NAVBAR WRAPPER */
.arv-navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 40px; /* slightly balanced */

    background: linear-gradient(135deg, #f5e6d3, #d2a679);
    backdrop-filter: blur(10px);
    background-color: rgba(210, 166, 121, 0.85);

    color:#2b2b2b;

    position:sticky;
    top:0;
    z-index:999;

    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

/* NAVBAR SCROLL EFFECT */
.arv-navbar.scrolled{
    background: rgba(210,166,121,0.95);
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

/* LEFT LOGO */
.arv-brand{
    display:flex;
    align-items:center;
    gap:10px;
}

.arv-brand img{
    height:50px;
    transition: transform 0.3s ease;
}

.arv-brand img:hover{
    transform: scale(1.1);
}

.arv-brand-name{
    font-size:20px;
    font-weight:700;
    color:#3b2a1a;
}

/* MENU CENTER */
.arv-menu{
    display:flex;
    align-items:center;
    gap:28px;
}

/* LINKS */
.arv-menu a{
    color:#1e1a16;
    font-size:15px;
    font-weight:500;
    position:relative;
}

/* UNDERLINE EFFECT */
.arv-menu a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    bottom:-5px;
    left:0;
    background:#8b5e34;
    transition:0.3s;
}

.arv-menu a:hover::after{
    width:100%;
}

.arv-menu a:hover{
    color:#8b5e34;
}

/* 👉 CART & WISHLIST (DESKTOP UPGRADE) */
.arv-menu a[href="/wishlist"],
.arv-menu a[href="/cart"]{
    background:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:15px;
    font-weight:600;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* BADGE */
.arv-badge{
    background:#ff4d4d;
    color:white;
    padding:2px 6px;
    border-radius:50%;
    font-size:11px;
    margin-left:4px;
}

/* HAMBURGER */
.arv-hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
    gap:6px;
}

.arv-hamburger span{
    width:28px;
    height:3px;
    background:#3b2a1a;
    border-radius:3px;
    transition:0.3s;
}

/* ANIMATION */
.arv-hamburger.active span:nth-child(1){
    transform: rotate(45deg) translate(5px,5px);
}
.arv-hamburger.active span:nth-child(2){
    opacity:0;
}
.arv-hamburger.active span:nth-child(3){
    transform: rotate(-45deg) translate(6px,-6px);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

.arv-navbar{
    padding:12px 15px;
}

/* LOGO */
.arv-brand img{
    height:40px;
}

.arv-brand-name{
    font-size:16px;
}

/* MENU DROPDOWN */
.arv-menu{
    position:absolute;
    top:70px;
    right:0;
    background: linear-gradient(135deg, #f5e6d3, #d2a679);
    flex-direction:column;
    width:240px;
    padding:20px;
    display:none;
    border-radius:0 0 0 15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    animation: slideDown 0.3s ease;
}

/* MENU LINKS */
.arv-menu a{
    padding:10px 0;
    border-bottom:1px solid rgba(0,0,0,0.1);
}

/* SHOW MENU */
.arv-menu.active{
    display:flex;
}

/* SHOW HAMBURGER */
.arv-hamburger{
    display:flex;
}

/* 👉 REMOVE CART/WISHLIST FROM MENU */
.arv-menu a:nth-child(6),
.arv-menu a:nth-child(7){
    display:none;
}

/* 👉 FLOATING ICON STYLE */
.arv-menu a[href="/wishlist"],
.arv-menu a[href="/cart"]{
    position:fixed;
    top:15px;
    font-size:20px;
    background:#fff;
    padding:6px 10px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* POSITION */
.arv-menu a[href="/wishlist"]{
    right:90px;
}

.arv-menu a[href="/cart"]{
    right:30px;
}

/* ANIMATION */
@keyframes slideDown{
    from{
        opacity:0;
        transform: translateY(-20px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

}
</style>

<div class="arv-navbar">

<!-- LEFT SIDE LOGO -->
<div class="arv-brand">
<a href="/">
<img src="{{ url_for('static', filename='uploads/Logo-removebg-preview.png') }}">
</a>
<div class="arv-brand-name">A R Vastram</div>
</div>

<!-- RIGHT MENU (ONLY NAV LINKS) -->
<div class="arv-menu" id="arvMenu">
<a href="/">Home</a>
<a href="/shop">Shop</a>
<a href="#about">About</a>
<a href="#testimonials">Testimonials</a>
<a href="#contact">Contact</a>
</div>

<!-- ALWAYS VISIBLE ICONS -->
<div class="arv-icons">
<a href="/wishlist">
🧡 <span id="wishCount">{{ wish_count or 0 }}</span>
</a>

<a href="/cart">
🛍️ <span id="cartCount">0</span>
</a>
</div>

<!-- HAMBURGER -->
<div class="arv-hamburger" id="arvHamburger">
<span></span>
<span></span>
<span></span>
</div>

</div>


<script>


const hamburger = document.querySelector(".arv-hamburger");
const menu = document.querySelector(".arv-menu");

hamburger.addEventListener("click", () => {
    hamburger.classList.toggle("active");
    menu.classList.toggle("active");
});

// Sticky scroll effect
window.addEventListener("scroll", () => {
    const navbar = document.querySelector(".arv-navbar");
    navbar.classList.toggle("scrolled", window.scrollY > 10);
});

</script>
