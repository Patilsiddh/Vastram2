<div class="men-carousel">
  <button class="arrow left">&#10094;</button>
  <div class="slides-wrapper">
    <div class="slides" id="slides">
      
      <img src="static\uploads\carosal1.jpeg" alt="">
      <img src="static\uploads\Carosal5.jpg" alt="">
      <img src="static\uploads\Carosal2.jpg" alt="">
      
    </div>
  </div>
  <button class="arrow right">&#10095;</button>
</div>
<style>


.men-carousel {
  width: 100%;           /* Full width of the page/container */
  height: 60vh;          /* Keep current height */
  overflow: hidden;
  position: relative;
}

.slides {
  display: flex;
  transition: transform 0.7s ease;
}

.slides-wrapper {
  width: 100%;
  height: 100%;
  overflow: hidden;      /* hide overflowing images */
}

.slides img {
  width: 100%;
  height: 100%;
  object-fit: cover;     /* cover the container without distortion */
  flex-shrink: 0;
}

/* ===== ARROWS ===== */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 32px;
  padding: 12px 18px;
  border: none;
  cursor: pointer;
  z-index: 10;
  border-radius: 50%;
  transition: 0.3s;
}

.arrow:hover { background: rgba(0,0,0,0.8); }

.left { left: 20px; }
.right { right: 20px; }

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .men-carousel { height: 50vh; }
  .arrow { font-size: 28px; padding: 10px 15px; }
}

@media(max-width:768px){
  .men-carousel { height: 40vh; }
  .arrow { font-size: 24px; padding: 8px 12px; }
}
</style>

<script>
// ==================== CAROUSEL JS ====================
const slides = document.getElementById('slides');
const images = slides.querySelectorAll('img');
let slideIndex = 0;

function showSlide(i) {
  slides.style.transform = `translateX(-${i * 100}%)`;
}

// Arrow buttons
document.querySelector('.men-carousel .left').addEventListener('click', () => {
  slideIndex = (slideIndex - 1 + images.length) % images.length;
  showSlide(slideIndex);
});

document.querySelector('.men-carousel .right').addEventListener('click', () => {
  slideIndex = (slideIndex + 1) % images.length;
  showSlide(slideIndex);
});

// Auto-slide every 5 seconds
setInterval(() => {
  slideIndex = (slideIndex + 1) % images.length;
  showSlide(slideIndex);
}, 5000);
</script>
