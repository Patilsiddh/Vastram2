<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel</title>
<style>
/* ==================== CAROUSEL ==================== */
.men-carousel {
  width: 100%;
  max-width: 800px; /* optional max width */
  height: 420px;
  overflow: hidden;
  border-radius: 15px;
  margin: 30px auto;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.slides {
  display: flex;
  transition: transform 0.7s ease;
}

.slides img {
  flex: 0 0 100%;
  height: 420px;
  object-fit: cover;
  cursor: pointer;
}

.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 28px;
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  z-index: 10;
  border-radius: 50%;
  transition: 0.3s;
}

.arrow:hover { background: rgba(0,0,0,0.8); }
.left { left: 15px; }
.right { right: 15px; }
</style>
</head>
<body>

<div class="men-carousel">
  <button class="arrow left">&#10094;</button>
  <button class="arrow right">&#10095;</button>

  <!-- Only one slides container -->
  <div class="slides" id="slides">
    <img src="static/    uploads/31b2857e-85bd-4b2d-bddb-a24d4cd9d02d_06dc3648-d95d-47e1-b89d-3e1b56745c36_Jodhpuri.jpg" alt="Slide 1">
    <img src="static\uploads\Carosal2.jpg" alt="Slide 2">
    <img src="static/uploads/Carosal3.webp" alt="Slide 3">
    <img src="static/uploads/Carosal4.jpg" alt="Slide 4">
  </div>
</div>

<script>
// ==================== CAROUSEL JS ====================
const slides = document.getElementById('slides');
const images = slides.querySelectorAll('img');
const totalSlides = images.length;
let index = 0;

function showSlide(i) {
  slides.style.transform = `translateX(-${i * 100}%)`;
}

// Arrow buttons
document.querySelector('.left').addEventListener('click', () => {
  index = (index - 1 + totalSlides) % totalSlides;
  showSlide(index);
});

document.querySelector('.right').addEventListener('click', () => {
  index = (index + 1) % totalSlides;
  showSlide(index);
});

// Optional: auto-slide every 5 seconds
setInterval(() => {
  index = (index + 1) % totalSlides;
  showSlide(index);
}, 5000);
</script>

</body>
</html>
