<style>/* ==================== CAROUSEL ==================== */
.men-carousel {

}

.slides { display: flex; transition: transform 0.7s ease; }
.slides img { flex: 0 0 100%; height: 420px; object-fit: cover; cursor: pointer; }

.arrow {

  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);

  font-size: 28px;
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  z-index: 10;
  border-radius: 50%;
  transition: 0.3s;

.arrow:hover { background: rgba(0,0,0,0.8); }
.left { left: 15px; }
.right { right: 15px; }
