<div class="men-carousel">
  <button class="arrow left">&#10094;</button>
  <button class="arrow right">&#10095;</button>
  <div class="slides" id="slides">
    <img src="static/uploads/carosal4.jpg" alt="Slide 1">
    <img src="static/uploads/carosal1.jpeg" alt="Slide 2">
    <img src="static/uploads/carosal2.jpg" alt="Slide 3">
    <img src="static/uploads/carosal3.webp" alt="Slide 4">
  </div>
</div>

<style>
/* ==================== FULL SCREEN DESKTOP CAROUSEL ==================== */
body, html {
  margin: 0;
  padding: 0;
  width: 100%;
}

.men-carousel {
  width: 100%;       /* full width of the screen */
  height: 100vh;     /* full viewport height */
  overflow: hidden;
  position: relative;
}

.slides {
  display: flex;
  transition: transform 0.7s ease;
}

.slides img {
  flex: 0 0 100%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* ===== ARROWS ===== */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 36px;
  padding: 14px 20px;
  border: none;
  cursor: pointer;
  z-index: 10;
  border-radius: 50%;
  transition: 0.3s;
}

.arrow:hover { background: rgba(0,0,0,0.8); }

.left { left: 30px; }
.right { right: 30px; }

/* ===== RESPONSIVE ===== */
@media(max-width:1440px){
  .arrow { font-size: 32px; padding: 12px 18px; }
}

@media(max-width:1024px){
  .men-carousel { height: 70vh; }
  .arrow { font-size: 28px; padding: 10px 15px; }
}

@media(max-width:768px){
  .men-carousel { height: 50vh; }
  .arrow { font-size: 24px; padding: 8px 12px; }
}
</style>

<script>
// ==================== CAROUSEL JS ====================
const slides = document.getElementById('slides');
const images = slides.querySelectorAll('img');
let slideIndex = 0;

function showSlide(i) {
  slides.style.transform = `translateX(-${i * 100}%)`;
}

document.querySelector('.left').addEventListener('click', () => {
  slideIndex = (slideIndex - 1 + images.length) % images.length;
  showSlide(slideIndex);
});

document.querySelector('.right').addEventListener('click', () => {
  slideIndex = (slideIndex + 1) % images.length;
  showSlide(slideIndex);
});

// Auto-slide every 5 seconds
setInterval(() => {
  slideIndex = (slideIndex + 1) % images.length;
  showSlide(slideIndex);
}, 5000);
</script>
